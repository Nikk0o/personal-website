<div id="exit-button">
	<a href="/{{ page.lang }}" id="void-door">{{ site.data.langs[page.lang]["exit"] }}</a>
	<div class="doors">
		{% for door in page.doors %}
			<a href="/{{ page.lang }}{{ door.href }}" class="door">
				{{ site.data.langs[page.lang][door.name].title }}
			</a>
		{% endfor %}
	</div>
</div>
