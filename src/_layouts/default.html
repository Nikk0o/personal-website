<!doctype html>
<html lang="{{ page.lang }}">
	<head>
		<meta charset="utf-8">
		<title>{{ page.title }}</title>
		<link rel="stylesheet" href="/assets/css/main.css">
		<link rel="stylesheet" href="/assets/css/{{ page.style }}">
		<link rel="icon" type="image/x-icon" href="/assets/images/{{ page.icon }}">
	</head>
	<body>
		<script>0</script>
		<div class="contents">
			<div class="header">
				<img src="/assets/images/{{ page.header-img }}">
				<nav>
					{% include exitDropdown.html %}

					{% for section in page.sections %}
						<a href="{{ section.href }}">{{ section.name }}</a>
					{% endfor %}
				</nav>
			</div>
			{{ content }}
		</div>
	</body>
</html>
