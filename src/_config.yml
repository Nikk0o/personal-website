baseurl: ""
url: "http://localhost"

# Site structure
source: .
destination  : ./_site
layouts_dir  : _layouts
includes_dir : _includes

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - _site/
  - templates/
